<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漫剧创作 — ManjuCraft</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .shot-row { display:flex; align-items:center; gap:8px; padding:10px 14px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); margin-bottom:6px; transition:.15s; }
        .shot-row:hover { box-shadow:var(--shadow-sm); border-color:var(--primary); }
        .shot-infos { flex:1; min-width:0; font-size:12px; color:var(--text2); line-height:1.7; }
        .shot-infos .label { color:var(--text3); font-size:11px; }
        .shot-thumb { width:100px; height:60px; flex-shrink:0; border-radius:4px; background:#f1f5f9; border:1.5px dashed var(--border); box-sizing:border-box; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:.15s; color:var(--text3); font-size:10px; gap:3px; flex-direction:column; }
        .shot-thumb:hover { border-color:var(--primary); color:var(--primary); background:var(--primary-bg); }
        .shot-thumb.has { border-color:var(--ok); background:var(--ok-bg); color:var(--ok); border-style:solid; }
        .shot-thumb .ti { font-size:20px; }
        .shot-vid { width:100px; height:60px; flex-shrink:0; border-radius:4px; background:#1e293b; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; color:#64748b; font-size:10px; gap:3px; }
        .shot-vid .vi { font-size:20px; }
        .shot-vid.has { background:linear-gradient(135deg,#1e1b4b,#312e81); }
        .shot-vid:hover { opacity:.85; }
        .shot-acts { display:flex; flex-direction:column; gap:4px; width:90px; flex-shrink:0; }
        .no-content { text-align:center; padding:60px 20px; color:var(--text3); }
        .no-content .icon { font-size:40px; margin-bottom:12px; }
        .no-content { text-align:center; padding:60px 20px; color:var(--text3); }
        .no-content .icon { font-size:40px; margin-bottom:12px; }
        .bound-item { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--bg); border-radius:6px; border:1px solid var(--border); margin-bottom:6px; }
        .bound-icon { width:32px; height:32px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
        .asset-check-item { display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:6px; cursor:pointer; transition:.1s; }
        .asset-check-item:hover { background:var(--bg); }
        .asset-check-item input[type=checkbox] { width:16px; height:16px; accent-color:var(--primary); }
        .extracted-item { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; background:var(--bg); border-radius:6px; margin-bottom:4px; border:1px solid var(--border); }
        .shot-info-cols { display:flex; flex:1; min-width:0; gap:10px; align-items:flex-start; }
        .info-col { font-size:11px; color:var(--text2); line-height:1.5; min-width:0; }
        .info-col-desc { flex:2.5; }
        .info-col-sm { flex:0 0 auto; white-space:nowrap; }
        .info-col .label { color:var(--text3); font-size:10px; }
        .frame-indicator { display:flex; flex-direction:column; align-items:center; justify-content:center; width:40px; height:60px; flex-shrink:0; border-radius:4px; background:var(--bg); border:1.5px dashed var(--border); box-sizing:border-box; cursor:pointer; transition:.15s; font-size:10px; color:var(--text3); gap:2px; }
        .frame-indicator:hover { border-color:var(--primary); color:var(--primary); background:var(--primary-bg); }
        .frame-indicator .num { font-size:16px; font-weight:700; }
        .frame-list-item { display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--surface); border:1px solid var(--border); border-radius:8px; margin-bottom:8px; font-size:13px; }
        .frame-type-badge { display:inline-block; padding:3px 12px; border-radius:12px; font-size:11px; font-weight:600; color:#fff; white-space:nowrap; }
        .frame-type-first { background:#4338ca; }
        .frame-type-middle { background:#0891b2; }
        .frame-type-last { background:#d97706; }
        .frame-list-time { color:var(--text3); font-size:12px; white-space:nowrap; }
        .frame-list-desc { flex:1; color:var(--text2); }
        .frame-list-status { font-size:12px; white-space:nowrap; }
        .extracted-item .name { font-weight:600; font-size:13px; }
        .extracted-item .desc { font-size:11px; color:var(--text3); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-left"><h1 class="logo">ManjuCraft</h1><span class="subtitle">漫剧开发工具</span></div>
        <div class="nav-right">
            <a href="../index.html" class="nav-link">首页</a>
            <a href="projects.html" class="nav-link">项目管理</a>
            <a href="story.html" class="nav-link">剧本创作</a>
            <a href="actors.html" class="nav-link">角色管理</a>
            <a href="assets.html" class="nav-link">资产管理</a>
        </div>
    </nav>

    <div class="prod-layout">
        <div class="episode-sidebar">
            <div class="episode-sidebar-header">
                <a href="projects.html" class="back-link">&laquo; 返回项目</a>
                <h3 id="pName"></h3>
                <p id="pStatus"></p>
            </div>
            <div class="episode-list" id="epList"></div>
            <div class="episode-sidebar-footer">
                <button class="btn btn-primary btn-sm" style="width:100%;" onclick="extractAllAssets()">&#129302; 一键提取资产</button>
                <a id="editScriptLink" href="#" class="btn btn-ghost btn-sm" style="width:100%;margin-top:6px;color:#a78bfa;display:block;text-align:center;">&#128214; 编辑剧本</a>
            </div>
        </div>

        <div class="prod-main">
            <div class="prod-toolbar">
                <h2 id="mainTitle">漫剧创作</h2>
                <div class="prod-tabs">
                    <div class="prod-tab active" data-tab="shots" onclick="switchTab('shots')">提取分镜</div>
                    <div class="prod-tab" data-tab="assets" onclick="switchTab('assets')">资产绑定</div>
                    <div class="prod-tab" data-tab="content" onclick="switchTab('content')">内容</div>
                </div>
            </div>
            <div class="prod-content" style="padding:16px 24px;">
                <div id="tab-shots" class="tab-panel"><div id="storyboardArea"></div></div>
                <div id="tab-assets" class="tab-panel hidden"><div id="assetBindArea"></div></div>
                <div id="tab-content" class="tab-panel hidden"><div id="contentArea"></div></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="previewModal">
        <div class="modal" style="width:800px;text-align:center;">
            <h3 id="previewTitle">预览</h3>
            <div id="previewBody" style="min-height:200px;display:flex;align-items:center;justify-content:center;background:#f1f5f9;border-radius:8px;font-size:14px;color:var(--text3);">加载中...</div>
            <div class="form-actions"><button class="btn btn-ghost" onclick="hideModal('previewModal')">关闭</button></div>
        </div>
    </div>

    <div class="modal-overlay" id="assetBindModal">
        <div class="modal" style="width:600px;">
            <h3 id="bindModalTitle">选择资产绑定</h3>
            <div style="display:flex;gap:8px;margin-bottom:14px;">
                <button class="btn btn-sm" style="background:var(--primary-bg);color:var(--primary);font-weight:600;border:1.5px solid var(--primary);" onclick="showBindType('actor')">角色</button>
                <button class="btn btn-sm btn-ghost" onclick="showBindType('scene')">场景</button>
                <button class="btn btn-sm btn-ghost" onclick="showBindType('prop')">道具</button>
            </div>
            <div id="bindAssetList" style="max-height:40vh;overflow-y:auto;"></div>
            <div class="form-actions">
                <button class="btn btn-ghost" onclick="hideModal('assetBindModal')">取消</button>
                <button class="btn btn-primary" onclick="confirmAssetBind()">确认绑定</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="extractConfirmModal">
        <div class="modal" style="width:640px;">
            <h3>&#129302; 资产提取确认</h3>
            <p style="font-size:13px;color:var(--text2);margin-bottom:14px;">AI 从剧本内容中提取到以下资产，请勾选需要入库的：</p>
            <div id="extractConfirmBody" style="max-height:45vh;overflow-y:auto;"></div>
            <div class="form-actions">
                <button class="btn btn-ghost" onclick="hideModal('extractConfirmModal')">取消</button>
                <button class="btn btn-primary" onclick="confirmExtractAssets()">确认入库</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="frameListModal">
        <div class="modal" style="width:700px;">
            <h3 id="frameListTitle">帧列表</h3>
            <div id="frameListBody" style="max-height:55vh;overflow-y:auto;"></div>
            <div class="form-actions"><button class="btn btn-ghost" onclick="hideModal('frameListModal')">关闭</button></div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
    var pid = null, pName = '';
    var chapters = [], episodes = [];
    var currentEpIdx = -1, currentShotIdx = -1;
    var currentTab = 'shots';
    var bindTempType = 'actor', bindTempSelected = [];

    (function(){
        var p = new URLSearchParams(window.location.search);
        pid = parseInt(p.get('projectId')) || null;
        if (!pid) { alert('请选择一个项目'); location.href = 'projects.html'; return; }
        var ps = JSON.parse(localStorage.getItem('mc_projects') || '[]');
        for (var i = 0; i < ps.length; i++) { if (ps[i].id === pid) { pName = ps[i].name; break; } }
        document.getElementById('pName').textContent = pName;
        document.getElementById('editScriptLink').href = 'story.html?projectId=' + pid;
        loadData();
    })();

    function loadData() {
        var stories = JSON.parse(localStorage.getItem('mc_stories') || '[]');
        var storyId = null;
        for (var i = 0; i < stories.length; i++) { if (stories[i].projectId === pid) { storyId = stories[i].id; break; } }
        if (!storyId) {
            var nf = '暂无剧本';
            document.getElementById('pStatus').textContent = nf;
            document.getElementById('epList').innerHTML = '<div style="padding:24px;text-align:center;color:#94a3b8;font-size:13px;">暂无剧本<br><br><a href="story.html?projectId=' + pid + '" class="btn btn-outline btn-sm">去创作剧本</a></div>';
            document.getElementById('storyboardArea').innerHTML = '<div class="no-content"><div class="icon">&#128196;</div><p>请先创建剧本</p></div>';
            document.getElementById('assetBindArea').innerHTML = '<div class="no-content"><div class="icon">&#128196;</div><p>请先创建剧本</p></div>';
            document.getElementById('contentArea').innerHTML = '<div class="no-content"><div class="icon">&#128196;</div><p>请先创建剧本</p></div>';
            return;
        }
        var allChapters = JSON.parse(localStorage.getItem('mc_chapters') || '[]');
        chapters = allChapters.filter(function(c){ return c.storyId === storyId; }).sort(function(a,b){ return a.order - b.order; });
        document.getElementById('pStatus').textContent = chapters.length + ' 章节';
        var allEps = JSON.parse(localStorage.getItem('mc_episodes') || '[]');
        episodes = allEps.filter(function(e){ return e.projectId === pid; }).sort(function(a,b){ return a.order - b.order; });
        if (episodes.length === 0 && chapters.length > 0) {
            var maxId = 0;
            for (var j = 0; j < allEps.length; j++) { if (allEps[j].id > maxId) maxId = allEps[j].id; }
            episodes = chapters.map(function(ch, i) {
                return { id: maxId + i + 1, projectId: pid, chapterNumber: ch.chapterNumber, chapterName: ch.chapterName, name: ch.chapterName, content: ch.content, order: i };
            });
            var merged = JSON.parse(localStorage.getItem('mc_episodes') || '[]').filter(function(e){ return e.projectId !== pid; });
            episodes.forEach(function(e){ merged.push(e); });
            localStorage.setItem('mc_episodes', JSON.stringify(merged));
        }
        renderEpSidebar();
        if (episodes.length) { if (currentEpIdx < 0) currentEpIdx = 0; setEp(currentEpIdx); }
        else { renderShotTab(); renderAssetTab(); renderContentTab(); }
        // auto-add frames to shots that don't have them
        var allShots = JSON.parse(localStorage.getItem('mc_shots') || '[]');
        var needUpdate = false;
        var migDesc = [
            { first: '全景展示环境氛围，奠定场景基调', middle: '镜头扫过场景细节，描绘空间布局', last: '远景收束，为下一镜头过渡' },
            { first: '角色入画出场，展示姿态与气质', middle: '中景跟拍角色行动，营造代入感', last: '角色停步或转身，引导观众视线' },
            { first: '面部大特写，捕捉微表情变化', middle: '镜头推进至眼部，强化情绪张力', last: '特写定格，留白渲染氛围' },
            { first: '过肩镜头建立对话空间关系', middle: '正反打切换，聚焦对话反应', last: '镜头拉回全景，对话场景结束' },
            { first: '关键道具特写，突出其重要性', middle: '道具细节展示，光影烘托质感', last: '道具被取走或触发，场景转换' },
            { first: '角色在环境中穿行移动', middle: '跟拍角色行动轨迹，展示环境变化', last: '角色到达新地点，画面过渡' },
            { first: '超大远景交代时空背景', middle: '镜头缓慢拉远，营造孤寂氛围', last: '画面升入高空，场景收束' }
        ];
        allShots.forEach(function(s) {
            var needsFrames = !s.frames || !s.frames.length || !s.frames[0] || !s.frames[0].description || s.frames[0].description.length < 5;
            if (needsFrames) {
                needUpdate = true;
                var dur = s.duration || 8;
                var tIdx = ((s.shotNumber || '0').slice(-1) * 1) % migDesc.length;
                var ft = migDesc[tIdx];
                s.frames = [
                    { frameType: 'First', description: ft.first, startTime: 0, duration: Math.min(2, dur * 0.25), order: 0, hasImage: false },
                    { frameType: 'Middle', description: ft.middle, startTime: Math.min(2, dur * 0.25), duration: Math.min(2.5, dur * 0.35), order: 1, hasImage: false },
                    { frameType: 'Last', description: ft.last, startTime: Math.min(4.5, dur * 0.6), duration: Math.min(3.5, dur * 0.4), order: 2, hasImage: false }
                ];
            }
        });
        if (needUpdate) localStorage.setItem('mc_shots', JSON.stringify(allShots));
    }

    function renderEpSidebar() {
        if (chapters.length === 0) {
            document.getElementById('epList').innerHTML = '<div style="padding:24px;text-align:center;color:#94a3b8;font-size:13px;">暂无剧本<br><br><a href="story.html?projectId=' + pid + '" class="btn btn-outline btn-sm">去创作剧本</a></div>';
            return;
        }
        var h = '<div class="episode-item' + (currentEpIdx === -1 ? ' active' : '') + '" onclick="setEp(-1)">'
            + '<span class="episode-num">ALL</span><div class="episode-info"><div class="episode-name">全部分集</div>'
            + '<div class="episode-meta">' + episodes.length + ' 集</div></div></div>';
        episodes.forEach(function(ep, i) {
            var bound = getBoundAssets(ep.id);
            var boundCount = (bound.actor?.length || 0) + (bound.scene?.length || 0) + (bound.prop?.length || 0);
            h += '<div class="episode-item' + (i === currentEpIdx ? ' active' : '') + '" onclick="setEp(' + i + ')">'
                + '<span class="episode-num">' + (ep.chapterNumber || 'E' + (i+1)) + '</span>'
                + '<div class="episode-info"><div class="episode-name">' + ep.name + '</div>'
                + '<div class="episode-meta">' + (getShots(ep.id).length) + ' 分镜' + (boundCount ? ' | ' + boundCount + ' 资源' : '') + '</div></div></div>';
        });
        document.getElementById('epList').innerHTML = h;
    }

    function setEp(idx) {
        currentEpIdx = idx; currentShotIdx = -1;
        renderEpSidebar();
        document.getElementById('mainTitle').textContent = idx === -1 ? '全部分集' : episodes[idx].chapterNumber + ' — ' + episodes[idx].name;
        renderShotTab(); renderAssetTab(); renderContentTab();
        if (currentTab === 'shots') renderShotTab();
        else if (currentTab === 'assets') renderAssetTab();
        else renderContentTab();
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.prod-tab').forEach(function(t){ t.classList.remove('active'); if (t.dataset.tab === tab) t.classList.add('active'); });
        document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.add('hidden'); });
        document.getElementById('tab-' + tab).classList.remove('hidden');
        if (tab === 'shots') renderShotTab();
        else if (tab === 'assets') renderAssetTab();
        else renderContentTab();
    }

    // ==================== DATA HELPERS ====================

    function getShots(eid) {
        return (JSON.parse(localStorage.getItem('mc_shots') || '[]')).filter(function(s){ return s.episodeId === eid; }).sort(function(a,b){ return a.order - b.order; });
    }
    function getAllShots() {
        var all = JSON.parse(localStorage.getItem('mc_shots') || '[]');
        if (currentEpIdx === -1) { var eids = {}; episodes.forEach(function(e){ eids[e.id] = true; }); return all.filter(function(s){ return eids[s.episodeId]; }).sort(function(a,b){ return a.order - b.order; }); }
        return all.filter(function(s){ return s.episodeId === episodes[currentEpIdx].id; }).sort(function(a,b){ return a.order - b.order; });
    }
    function saveShots(list) {
        var eid = currentEpIdx >= 0 ? episodes[currentEpIdx].id : null;
        var all = JSON.parse(localStorage.getItem('mc_shots') || '[]');
        if (eid) { all = all.filter(function(s){ return s.episodeId !== eid; }); }
        else { var eids = {}; episodes.forEach(function(e){ eids[e.id] = true; }); all = all.filter(function(s){ return !eids[s.episodeId]; }); }
        list.forEach(function(s){ all.push(s); }); localStorage.setItem('mc_shots', JSON.stringify(all));
    }
    function updateShot(id, updates) {
        var all = JSON.parse(localStorage.getItem('mc_shots') || '[]');
        for (var i = 0; i < all.length; i++) { if (all[i].id === id) { Object.keys(updates).forEach(function(k){ all[i][k] = updates[k]; }); break; } }
        localStorage.setItem('mc_shots', JSON.stringify(all));
    }
    function getBoundAssets(eid) {
        var all = JSON.parse(localStorage.getItem('mc_ep_assets') || '{}');
        return all[eid] || { actor: [], scene: [], prop: [] };
    }
    function saveBoundAssets(eid, data) {
        var all = JSON.parse(localStorage.getItem('mc_ep_assets') || '{}');
        all[eid] = data; localStorage.setItem('mc_ep_assets', JSON.stringify(all));
    }

    // ==================== TAB 1: SHOTS ====================

    function renderShotTab() {
        var shots = getAllShots();
        if (shots.length === 0) {
            document.getElementById('storyboardArea').innerHTML = '<div class="no-content"><div class="icon">&#127916;</div><p>暂无镜头</p><p style="font-size:12px;color:var(--text3);margin-top:8px;">点击「重新提取分镜」一键生成</p></div>';
            return;
        }
        var allAct = JSON.parse(localStorage.getItem('mc_asset_Actor') || '[]');
        var allScn = JSON.parse(localStorage.getItem('mc_asset_Scene') || '[]');
        var allPrp = JSON.parse(localStorage.getItem('mc_asset_Prop') || '[]');

        // header
        var html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 4px;">'
            + '<span style="font-size:14px;color:var(--text3);">共 ' + shots.length + ' 个镜头</span>'
            + '<div style="display:flex;gap:8px;">'
            + '<button class="btn btn-primary btn-sm" onclick="regenerateAll()">&#129302; 重新提取</button>'
            + '<button class="btn btn-info btn-sm" onclick="generateAllShots()">&#127912; 一键生成</button>'
            + '</div></div>';

        // column headers
        html += '<div class="shot-row" style="font-size:11px;color:var(--text3);font-weight:600;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;cursor:default;">'
            + '<div class="shot-info-cols">'
            + '<div class="info-col info-col-desc">描述</div>'
            + '<div class="info-col info-col-sm" style="min-width:60px;">景别</div>'
            + '<div class="info-col info-col-sm" style="min-width:60px;">运镜</div>'
            + '</div>'
            + '<div style="width:40px;text-align:center;">帧</div>'
            + '<div style="width:100px;text-align:center;">首帧图</div>'
            + '<div style="width:100px;text-align:center;">视频</div>'
            + '<div style="width:90px;text-align:center;">操作</div>'
            + '</div>';

        shots.forEach(function(s, i) {
            var refs = tryJson(s.assetRefs, {});
            var actorN = []; refs.actor && refs.actor.forEach(function(id){ for (var k = 0; k < allAct.length; k++) { if (allAct[k].id === id) { actorN.push(allAct[k].name); break; } } });
            var sceneN = []; refs.scene && refs.scene.forEach(function(id){ for (var k = 0; k < allScn.length; k++) { if (allScn[k].id === id) { sceneN.push(allScn[k].name); break; } } });
            var propN = []; refs.prop && refs.prop.forEach(function(id){ for (var k = 0; k < allPrp.length; k++) { if (allPrp[k].id === id) { propN.push(allPrp[k].name); break; } } });

var hasFirst = s.hasFirstFrame || false;
            var hasVid = s.hasVideo || false;
            var frames = Array.isArray(s.frames) ? s.frames : [];

            html += '<div class="shot-row">';

            // info columns
            html += '<div class="shot-info-cols">';
            html += '<div class="info-col info-col-desc">'
                + '<div style="font-weight:600;color:var(--primary);font-size:13px;margin-bottom:2px;">' + (s.shotNumber || '#' + (i+1)) + '</div>'
                + (s.description ? '<span class="label">描述：</span>' + s.description : '')
                + '</div>';
            html += '<div class="info-col info-col-sm" style="min-width:60px;"><span class="label">景别：</span>' + (s.shotSize || '-') + '</div>';
            html += '<div class="info-col info-col-sm" style="min-width:60px;"><span class="label">运镜：</span>' + (s.cameraMovement || '-') + '</div>';
            html += '</div>';

            // frame indicator
            html += '<div class="frame-indicator' + (frames.length === 0 ? '' : '') + '" onclick="' + (frames.length > 0 ? 'showFrameList(' + s.id + ')' : '') + '" title="' + (frames.length > 0 ? '点击查看帧列表' : '') + '" style="' + (frames.length === 0 ? 'opacity:0.3;cursor:default;' : '') + '">'
                + '<span class="num">' + frames.length + '</span>'
                + '<span>帧</span>'
                + '</div>';

            // thumbnail
            html += '<div class="shot-thumb' + (hasFirst ? ' has' : '') + '" onclick="' + (hasFirst ? 'previewImage(' + s.id + ')' : 'genFirstFrame(' + s.id + ')') + '" title="' + (hasFirst ? '点击预览' : '点击生成') + '">'
                + '<span class="ti">' + (hasFirst ? '&#128247;' : '&#127912;') + '</span>'
                + '<span>' + (hasFirst ? '已生成' : '生成首帧') + '</span>'
                + '</div>';

            // video
            html += '<div class="shot-vid' + (hasVid ? ' has' : '') + '" onclick="' + (hasVid ? 'playVideo(' + s.id + ')' : 'genVideo(' + s.id + ')') + '" title="' + (hasVid ? '点击播放' : '点击生成') + '">'
                + '<span class="vi">' + (hasVid ? '&#9654;' : '&#127909;') + '</span>'
                + '<span>' + (hasVid ? '播放' : '生成视频') + '</span>'
                + '</div>';

            // buttons
            html += '<div class="shot-acts">'
                + '<button class="btn btn-xs ' + (hasFirst ? 'btn-ghost' : 'btn-primary') + '" onclick="genFirstFrame(' + s.id + ')">' + (hasFirst ? '重制首帧' : '生成首帧') + '</button>'
                + '<button class="btn btn-xs ' + (hasVid ? 'btn-ghost' : 'btn-info') + '" onclick="genVideo(' + s.id + ')">' + (hasVid ? '重制视频' : '生成视频') + '</button>'
                + '</div>';

            html += '</div>';
        });

        document.getElementById('storyboardArea').innerHTML = html;
    }

    function buildShotFrames(shot, template) {
        var dur = shot.duration || 8;
        var tIdx = ((shot.shotNumber || '0').slice(-1) * 1) % _frameTemplates.length;
        var ft = _frameTemplates[tIdx];
        var frames = [
            { frameType: 'First', description: ft.first, startTime: 0, duration: Math.min(2, dur * 0.25), order: 0, hasImage: false },
            { frameType: 'Middle', description: ft.middle, startTime: Math.min(2, dur * 0.25), duration: Math.min(2.5, dur * 0.35), order: 1, hasImage: false },
            { frameType: 'Last', description: ft.last, startTime: Math.min(4.5, dur * 0.6), duration: Math.min(3.5, dur * 0.4), order: 2, hasImage: false }
        ];
        // add extra middle frames for longer shots
        if (dur >= 10) {
            var mid2 = { frameType: 'Middle', description: _frameTemplates[(tIdx + 1) % _frameTemplates.length].middle, startTime: Math.min(5, dur * 0.4), duration: Math.min(2.5, dur * 0.25), order: 2, hasImage: false };
            frames.splice(2, 0, mid2);
            frames.forEach(function(f, i) { f.order = i; });
        }
        return frames;
    }

        var sid = maxShotId + 1;
        var ns = [];
        targetEps.forEach(function(ep) {
            var cnt = Math.max(1, Math.min(7, Math.ceil((ep.content || '').length / 90)));
            for (var i = 0; i < cnt; i++) {
                var t = templates[i % templates.length];
                var aIds = [], sIds = [], pIds = [];
                if (t.a >= 0 && allActors[t.a]) aIds.push(allActors[t.a].id);
                if (t.s >= 0 && allScenes[t.s]) sIds.push(allScenes[t.s].id);
                if (t.p >= 0 && allProps[t.p]) pIds.push(allProps[t.p].id);
                var shot = {
                    id: sid, episodeId: ep.id, description: t.desc,
                    shotNumber: 'SH' + String(i+1).padStart(3, '0'),
                    shotSize: t.size, cameraMovement: t.cam, shotAnalysis: t.analysis,
                    highlight: t.hl,

                    hasFirstFrame: false, hasVideo: false, order: i
                };
                shot.frames = buildShotFrames(shot, t);
                ns.push(shot);
                sid++;
            }
        });
        saveShots(ns);
        renderEpSidebar(); renderShotTab();
        showToast('分镜提取完成，共 ' + ns.length + ' 个', 'success');
    }

    function openBindModal() {
        if (currentEpIdx < 0) return;
        bindTempType = 'actor'; bindTempSelected = [];
        showBindType('actor');
        showModal('assetBindModal');
    }

    function showBindType(type) {
        bindTempType = type;
        document.querySelectorAll('#assetBindModal .btn').forEach(function(b){ b.className = 'btn btn-sm btn-ghost'; });
        document.querySelectorAll('#assetBindModal .btn')[['actor','scene','prop'].indexOf(type)].className = 'btn btn-sm';
        document.querySelectorAll('#assetBindModal .btn')[['actor','scene','prop'].indexOf(type)].style.cssText = 'background:var(--primary-bg);color:var(--primary);font-weight:600;border:1.5px solid var(--primary);';
        var allItems = JSON.parse(localStorage.getItem('mc_asset_' + (type === 'actor' ? 'Actor' : type === 'scene' ? 'Scene' : 'Prop')) || '[]');
        var bound = currentEpIdx >= 0 ? getBoundAssets(episodes[currentEpIdx].id)[type] : [];
        var html = '';
        if (allItems.length === 0) { html = '<p style="text-align:center;color:var(--text3);padding:20px;font-size:13px;">暂无' + {actor:'角色',scene:'场景',prop:'道具'}[type] + '数据</p>'; }
        else {
            allItems.forEach(function(item) {
                var checked = bindTempSelected.indexOf(item.id) >= 0 || bound.indexOf(item.id) >= 0;
                html += '<label class="asset-check-item" style="opacity:' + (bound.indexOf(item.id) >= 0 ? '0.5' : '1') + ';">'
                    + '<input type="checkbox" ' + (checked ? 'checked' : '') + (bound.indexOf(item.id) >= 0 ? ' disabled' : '') + ' onchange="toggleBindSelect(' + item.id + ',this.checked)">'
                    + '<div style="flex:1;"><div class="name">' + item.name + '</div><div class="desc">' + (item.desc || '') + '</div></div>'
                    + (bound.indexOf(item.id) >= 0 ? '<span style="font-size:10px;color:var(--ok);">已绑定</span>' : '')
                    + '</label>';
            });
        }
        document.getElementById('bindAssetList').innerHTML = html;
    }

    function toggleBindSelect(id, checked) {
        if (checked && bindTempSelected.indexOf(id) < 0) bindTempSelected.push(id);
        else if (!checked) bindTempSelected = bindTempSelected.filter(function(i){ return i !== id; });
    }

    function confirmAssetBind() {
        if (currentEpIdx < 0) return;
        var ep = episodes[currentEpIdx];
        var bound = getBoundAssets(ep.id);
        if (bindTempSelected.length) {
            if (!bound[bindTempType]) bound[bindTempType] = [];
            bindTempSelected.forEach(function(id) {
                if (bound[bindTempType].indexOf(id) < 0) bound[bindTempType].push(id);
            });
            saveBoundAssets(ep.id, bound);
        }
        hideModal('assetBindModal');
        renderAssetTab();
        showToast('资产绑定已更新', 'success');
    }

    function unbindAsset(type, id) {
        if (currentEpIdx < 0) return;
        var ep = episodes[currentEpIdx];
        var bound = getBoundAssets(ep.id);
        bound[type] = bound[type].filter(function(i){ return i !== id; });
        saveBoundAssets(ep.id, bound);
        renderAssetTab();
    }

    // ==================== TAB 3: CONTENT ====================

    function renderContentTab() {
        if (currentEpIdx < 0) {
            document.getElementById('contentArea').innerHTML = '<div class="no-content"><div class="icon">&#128214;</div><p>请先选择一个分集</p></div>';
            return;
        }
        var ep = episodes[currentEpIdx];
        var html = '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;">'
            + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">'
            + '<h3 style="font-size:16px;font-weight:700;">' + ep.chapterNumber + ' — ' + ep.name + '</h3>'
            + '<button class="btn btn-primary btn-sm" onclick="extractFromContent()">&#129302; 提取资产</button></div>'
            + '<div style="font-size:14px;line-height:1.8;white-space:pre-wrap;">' + escHtml(ep.content || '（暂无内容）') + '</div>'
            + '</div>';
        document.getElementById('contentArea').innerHTML = html;
    }

    function extractFromContent() {
        if (currentEpIdx < 0) return;
        showToast('AI 正在分析剧本内容提取资产...', 'info');
        setTimeout(function() {
            var extracted = {
                Actor: [
                    { name: '凯恩', desc: '年轻勇敢的骑士主角' },
                    { name: '莉娜', desc: '精灵弓箭手，善用自然魔法' }
                ],
                Prop: [
                    { name: '银剑', desc: '凯恩的佩剑' },
                    { name: '失落之宝', desc: '金色神器宝石' }
                ],
                Scene: [
                    { name: '宁静村庄', desc: '群山环绕的起点村落' },
                    { name: '黑暗森林', desc: '神秘危险的古老森林' }
                ],
                Bgm: [
                    { name: '冒险启程', desc: '激昂冒险主题音乐' }
                ]
            };
            var existing = { Actor: JSON.parse(localStorage.getItem('mc_asset_Actor') || '[]'), Prop: JSON.parse(localStorage.getItem('mc_asset_Prop') || '[]'), Scene: JSON.parse(localStorage.getItem('mc_asset_Scene') || '[]'), Bgm: JSON.parse(localStorage.getItem('mc_asset_Bgm') || '[]') };
            var body = '';
            ['Actor','Prop','Scene','Bgm'].forEach(function(k) {
                body += '<div style="margin-bottom:12px;"><h4 style="font-size:13px;font-weight:600;color:var(--text3);margin-bottom:6px;">' + {Actor:'角色',Prop:'道具',Scene:'场景',Bgm:'BGM'}[k] + '</h4>';
                extracted[k].forEach(function(item, idx) {
                    var dup = false;
                    for (var i = 0; i < existing[k].length; i++) { if (existing[k][i].name === item.name) { dup = true; break; } }
                    body += '<div class="extracted-item" style="opacity:' + (dup ? '0.5' : '1') + ';">'
                        + '<div><div class="name">' + item.name + '</div><div class="desc">' + item.desc + '</div></div>'
                        + '<label style="font-size:12px;display:flex;align-items:center;gap:6px;"><input type="checkbox" id="ext_' + k + '_' + idx + '" ' + (dup ? 'checked disabled' : 'checked') + '>'
                        + (dup ? '已存在' : '新发现') + '</label>'
                        + '</div>';
                });
                body += '</div>';
            });
            document.getElementById('extractConfirmBody').innerHTML = body;
            showModal('extractConfirmModal');
            window._extractedData = extracted;
        }, 1200);
    }

    function confirmExtractAssets() {
        var extracted = window._extractedData || {};
        ['Actor','Prop','Scene','Bgm'].forEach(function(k) {
            var existing = JSON.parse(localStorage.getItem('mc_asset_' + k) || '[]');
            extracted[k].forEach(function(item, idx) {
                var cb = document.getElementById('ext_' + k + '_' + idx);
                if (cb && cb.checked) {
                    var dup = false;
                    for (var i = 0; i < existing.length; i++) { if (existing[i].name === item.name) { dup = true; break; } }
                    if (!dup) existing.push({ id: Date.now() + Math.random(), name: item.name, desc: item.desc });
                }
            });
            localStorage.setItem('mc_asset_' + k, JSON.stringify(existing));
        });
        hideModal('extractConfirmModal');
        showToast('资产已入库', 'success');
        renderAssetTab();
    }

    function extractAllAssets() {
        if (chapters.length === 0) { alert('请先创建剧本'); return; }
        showToast('AI 正在分析剧本提取资产...', 'info');
        setTimeout(function() {
            var s = {
                Actor: [{name:'英雄',desc:'勇敢正义的主人公'},{name:'精灵射手',desc:'金发尖耳精灵'},{name:'智者',desc:'白发老法师'},{name:'暗影魔王',desc:'邪恶领主'}],
                Prop: [{name:'失落神器',desc:'金色宝石'},{name:'符文剑',desc:'传奇宝剑'}],
                Scene: [{name:'边陲村落',desc:'宁静村庄'},{name:'幽暗密林',desc:'古老森林'},{name:'水晶圣殿',desc:'地下宫殿'}],
                Bgm: [{name:'征途',desc:'激昂管弦乐'},{name:'暗潮',desc:'悬疑低沉音乐'}]
            };
            ['Actor','Prop','Scene','Bgm'].forEach(function(k) {
                var ex = JSON.parse(localStorage.getItem('mc_asset_' + k) || '[]');
                s[k].forEach(function(item) {
                    var dup = false; for (var i = 0; i < ex.length; i++) { if (ex[i].name === item.name) { dup = true; break; } }
                    if (!dup) ex.push({ id: Date.now() + Math.random(), name: item.name, desc: item.desc });
                });
                localStorage.setItem('mc_asset_' + k, JSON.stringify(ex));
            });
            showToast('资产提取完成！', 'success');
        }, 1500);
    }

    function showFrameList(shotId) {
        var all = JSON.parse(localStorage.getItem('mc_shots') || '[]');
        var s = null;
        for (var i = 0; i < all.length; i++) { if (all[i].id === shotId) { s = all[i]; break; } }
        if (!s) { showToast('未找到镜头数据', 'error'); return; }
        var frames = s.frames || [];
        // ensure every frame has a description
        var frameFallbacks = ['首帧画面：镜头起始状态', '中段画面：情节推进中', '尾帧画面：镜头收束过渡'];
        var descFixed = false;
        frames.forEach(function(f, fi) {
            if (!f) return;
            if (!f.description || f.description.length < 5 || f.description.indexOf('首帧画面') === 0) { f.description = frameFallbacks[Math.min(fi, 2)] || ('帧' + (fi+1) + '画面'); descFixed = true; }
        });
        if (descFixed) { for (var i = 0; i < all.length; i++) { if (all[i].id === shotId) { all[i].frames = frames; break; } } localStorage.setItem('mc_shots', JSON.stringify(all)); }
        document.getElementById('frameListTitle').textContent = (s.shotNumber || '#' + shotId) + ' 帧列表 (' + frames.length + ' 帧)';
        var html = '';
        frames.forEach(function(f, fi) {
            if (!f) return;
            var ft = f.frameType || 'Middle';
            var badgeCls = 'frame-type-' + ft.toLowerCase();
            var badgeLabel = ft === 'First' ? '首帧' : ft === 'Middle' ? '中段' : '尾帧';
            var st = f.startTime || 0;
            var dur = f.duration || 2;
            var timeStr = st.toFixed(1) + 's ~ ' + (st + dur).toFixed(1) + 's';
            var hasImg = f.hasImage || false;
            html += '<div class="frame-list-item" style="flex-direction:column;align-items:stretch;">'
                + '<div style="display:flex;gap:14px;">'
                + '<div style="width:120px;flex-shrink:0;aspect-ratio:16/9;background:var(--bg);border:1.5px dashed var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text3);">' + (hasImg ? '&#128247;' : '&#127912;') + '</div>'
                + '<div style="flex:1;display:flex;flex-direction:column;">'
                + '<div style="display:flex;align-items:center;justify-content:space-between;">'
                + '<div style="display:flex;align-items:center;gap:10px;">'
                + '<span class="frame-type-badge ' + badgeCls + '">' + badgeLabel + '</span>'
                + '<span class="frame-list-time">' + timeStr + '</span>'
                + '</div>'
                + '<div style="display:flex;align-items:center;gap:8px;">'
                + '<span style="font-size:12px;color:' + (hasImg ? 'var(--ok)' : 'var(--text3)') + ';">' + (hasImg ? '&#128247; 已生成' : '&#128247; 未生成') + '</span>'
                + '<button class="btn btn-xs ' + (hasImg ? 'btn-ghost' : 'btn-primary') + '" onclick="genFrameImage(' + shotId + ',' + fi + ',function(){setTimeout(function(){showFrameList(' + shotId + ')},100)})">' + (hasImg ? '重制' : '生成图片') + '</button>'
                + '</div>'
                + '</div>'
                + '<div style="margin-top:8px;font-size:13px;color:var(--text2);line-height:1.6;">' + (f.description || '') + '</div>'
                + '</div>'
                + '</div>'
                + '</div>';
        });
        document.getElementById('frameListBody').innerHTML = html || '<p style="text-align:center;color:var(--text3);padding:30px;">暂无帧数据</p>';
        ['previewModal','assetBindModal','extractConfirmModal'].forEach(function(id){ hideModal(id); });
        showModal('frameListModal');
    }

    function genFrameImage(shotId, frameIdx, done) {
        showToast('正在生成帧图片...', 'info');
        setTimeout(function() {
            var all = JSON.parse(localStorage.getItem('mc_shots') || '[]');
            for (var i = 0; i < all.length; i++) {
                if (all[i].id === shotId) {
                    if (!all[i].frames) all[i].frames = [];
                    if (all[i].frames[frameIdx]) all[i].frames[frameIdx].hasImage = true;
                    if (frameIdx === 0) all[i].hasFirstFrame = true;
                    break;
                }
            }
            localStorage.setItem('mc_shots', JSON.stringify(all));
            renderShotTab();
            if (done) done();
            showToast('帧图片已生成', 'success');
        }, 1500);
    }

    function tryJson(s, d) { if (!s) return d; try { return JSON.parse(s); } catch(e) { return d; } }
    function escHtml(t) { if (!t) return ''; return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
    </script>
</body>
</html>
